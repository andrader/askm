[project]
site_name = "jup"
site_description = "Agent Skills Manager"
site_url = "https://andrader.github.io/jup/"
site_author = "Rubens Andrade"
copyright = "&copy; 2025 Rubens Andrade"
repo_url = "https://github.com/andrader/jup"
repo_name = "andrader/jup"

nav = [
    { "Home" = "index.md" },
    { "Reference" = "reference.md" },
    { "Comparison with npx" = "jup-vs-npx-skills.md" }
]

[project.theme]
features = [
    "navigation.sections",
    "navigation.expand",
    "content.code.copy",
    "search.suggest",
    "search.highlight",
    "header.autohide",
    "content.action.edit",
    "content.action.view"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = true
