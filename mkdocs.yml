site_name: jup
site_description: Agent Skills Manager
repo_url: https://github.com/andrader/jup
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Reference: reference.md
  - Comparison with npx: jup-vs-npx-skills.md
  - Superpowers:
    - Plans:
      - Jup Enhancements: superpowers/plans/2026-04-16-jup-enhancements.md
      - Jup MV Path: superpowers/plans/2026-04-16-jup-mv-path.md
      - Manage Unmanaged Skills: superpowers/plans/2026-04-17-manage-unmanaged-skills.md
    - Specs:
      - Jup Enhancements Design: superpowers/specs/2026-04-16-jup-enhancements-design.md
      - Jup MV Path Design: superpowers/specs/2026-04-16-jup-mv-path-design.md
