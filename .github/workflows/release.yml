name: Release

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write  # Mandatory for trusted publishing
      contents: write  # Mandatory for semantic-release to create tags/releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.16.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix permissions
        if: steps.release.outputs.released == 'true'
        run: sudo chown -R $(id -u):$(id -g) dist/

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        run: |
          uv build
          uv publish

      - name: Update Floating Tags
        if: steps.release.outputs.released == 'true'
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          
          # Always update latest tag
          git tag -f latest "$VERSION"
          git push -f origin latest

          # Only update stable if on the release branch (stable version)
          if [ "${{ github.ref_name }}" == "release" ]; then
            git tag -f stable "$VERSION"
            git push -f origin stable
          fi
