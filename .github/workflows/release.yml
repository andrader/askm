name: Release

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write  # Mandatory for trusted publishing
      contents: write  # Mandatory for semantic-release to create tags/releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Python Semantic Release (Version)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Python Semantic Release (Publish VCS)
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish

      - name: Fix permissions
        if: steps.release.outputs.released == 'true'
        run: sudo chown -R $(id -u):$(id -g) dist/

      - name: Build Package
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        run: uv publish

      - name: Update Floating Tags
        if: steps.release.outputs.released == 'true'
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          
          # Always update latest tag
          git tag -f latest "$VERSION"
          git push -f origin latest

          # Only update stable if on the release branch (stable version)
          if [ "${{ github.ref_name }}" == "release" ]; then
            git tag -f stable "$VERSION"
            git push -f origin stable
          fi
