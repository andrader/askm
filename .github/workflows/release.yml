name: Release

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write  # Mandatory for trusted publishing
      contents: write  # Mandatory for semantic-release to create tags/releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Python Semantic Release (Version)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version --skip-build

      - name: Build Package
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Python Semantic Release (Publish VCS)
        if: steps.release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish

      - name: Fix permissions
        if: steps.release.outputs.released == 'true'
        run: sudo chown -R $(id -u):$(id -g) dist/

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        run: uv publish

      - name: Update Floating Tags
        if: steps.release.outputs.released == 'true'
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          
          # Always update latest tag
          git tag -f latest "$VERSION"
          git push -f origin latest

          # Only update stable if on the release branch (stable version)
          if [ "${{ github.ref_name }}" == "release" ]; then
            git tag -f stable "$VERSION"
            git push -f origin stable
          fi

      - name: Back-sync release to main
        if: steps.release.outputs.released == 'true' && github.ref_name == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          # Merge release into main, favoring main for conflicts but then
          # explicitly taking the source-of-truth files from release
          git merge origin/release -X ours --no-edit
          git checkout origin/release -- CHANGELOG.md pyproject.toml
          git add CHANGELOG.md pyproject.toml
          git diff --cached --quiet || git commit -m "chore: sync release state to main"
          git push origin main
