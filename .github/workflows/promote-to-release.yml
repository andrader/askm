name: Promote to Release

on:
  schedule:
    # Runs every day at 08:00 UTC (5am BRT)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          ref: release
          fetch-depth: 0

      - name: Merge main into release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Use -X theirs to favor changes from main in case of conflicts (like CHANGELOG or version)
          git merge origin/main -X theirs --no-edit
          git push origin release
          
          # Explicitly trigger the release workflow since pushes from GITHUB_TOKEN don't trigger other workflows
          gh workflow run release.yml --ref release
