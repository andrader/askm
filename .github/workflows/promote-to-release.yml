name: Promote to Main (Stable)

on:
  schedule:
    # Runs every day at 08:00 UTC (5am BRT)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Merge dev into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dev
          # Favor dev changes to ensure latest staging features are promoted
          git merge origin/dev -X theirs --no-edit
          git push origin main
          
          # Explicitly trigger the publish workflow on main
          gh workflow run publish.yml --ref main
