name: Publish

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    outputs:
      released:
        description: "Whether a new version was released"
        value: ${{ jobs.publish.outputs.released }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Python Semantic Release (Version)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release --verbose version --skip-build

      - name: Annotate Release
        run: |
          if [ "${{ steps.release.outputs.released }}" == "true" ]; then
            echo "::notice title=Release Success::Released version ${{ steps.release.outputs.tag }} on ${{ inputs.branch }}"
          else
            echo "::notice title=Release Skipped::No new version released for ${{ inputs.branch }}"
          fi

      - name: Build Package
        if: ${{ steps.release.outputs.released == 'true' }}
        run: uv build

      - name: Python Semantic Release (Publish VCS)
        if: ${{ steps.release.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release publish

      - name: Fix permissions
        if: ${{ steps.release.outputs.released == 'true' }}
        run: sudo chown -R $(id -u):$(id -g) dist/

      - name: Publish to PyPI
        if: ${{ steps.release.outputs.released == 'true' }}
        run: uv publish

      - name: Update Floating Tags
        if: ${{ steps.release.outputs.released == 'true' }}
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          
          # Always update latest tag
          git tag -f latest "$VERSION"
          git push -f origin latest

          # Only update stable if on the main branch (stable version)
          if [ "${{ inputs.branch }}" == "main" ]; then
            git tag -f stable "$VERSION"
            git push -f origin stable
          fi

      - name: Sync main back to dev
        if: ${{ inputs.branch == 'main' && steps.release.outputs.released == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin dev
          git checkout dev
          # Merge main into dev to keep versioning and changelog in sync
          git merge origin/main --no-edit
          git push origin dev
