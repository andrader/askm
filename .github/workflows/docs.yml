name: Docs

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Deploy Docs
        run: |
          uv run mkdocs gh-deploy --force
