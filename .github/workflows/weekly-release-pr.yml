name: Weekly Release PR

on:
  schedule:
    # Runs every Friday at 16:00 UTC
    - cron: '0 16 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Create PR from main to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure labels exist
          gh label create "release" --color "0E8A16" --description "Stable release promotion" || true
          gh label create "automated-pr" --color "FBCA04" --description "Automatically generated PR" || true

          # Check if PR already exists
          PR_EXISTS=$(gh pr list --base release --head main --state open --json number --jq '.[0].number')
          
          if [ -n "$PR_EXISTS" ]; then
            echo "PR already exists: #$PR_EXISTS"
            exit 0
          fi

          BODY=$(cat <<EOF
          This PR is automatically generated to promote the current \`main\` branch to \`release\`.
          Merging this PR will trigger a **stable version release**.
          
          Please verify:
          - [ ] All tests passed on \`main\`.
          - [ ] All new features are ready for stable users.
          - [ ] CHANGELOG looks correct.
          EOF
          )
          
          gh pr create \
            --base release \
            --head main \
            --title "🚀 Weekly Release Promotion: main -> release" \
            --body "$BODY" \
            --label "release" \
            --label "automated-pr"
