<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Unsubscribe Report</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        tr:hover { background-color: #f1f1f1; }
        .success { color: green; font-weight: bold; }
        .pending { color: orange; font-weight: bold; }
        .manual { color: blue; font-weight: bold; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Gmail Unsubscribe Results</h1>
    <p>Summary of automated and manual unsubscription actions performed by the Agent Skill.</p>
    <table>
        <thead>
            <tr>
                <th>From</th>
                <th>Subject</th>
                <th>Method</th>
                <th>Action/Link</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {{ROWS}}
        </tbody>
    </table>
</body>
</html>
